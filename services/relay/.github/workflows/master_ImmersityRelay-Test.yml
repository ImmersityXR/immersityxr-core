# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ImmersityRelay-Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://immersityxr.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_b7b2ca21b3ac43bbb8d8793664d29fe0 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_d3ff472d54754e9699dc0c2ff3d42ec3 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_b7b2ca21b3ac43bbb8d8793664d29fe0 }}/komodo-relay/komodo-relay:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ImmersityRelay-Test'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_3dc0b4d8f53a40169598933ba4587299 }}
        images: 'immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_b7b2ca21b3ac43bbb8d8793664d29fe0 }}/komodo-relay/komodo-relay:${{ github.sha }}'