# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ImmersityRelay-Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://immersityxr.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_7359e44cd0d444d0ab4ae0c762b44192 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_b8536d29ba0d4368bbf5234a464ead70 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_7359e44cd0d444d0ab4ae0c762b44192 }}/komodo-relay/komodo-relay:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ImmersityRelay-Test'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_2b0ec77806c74ff28dac954a8a4c2763 }}
        images: 'immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_7359e44cd0d444d0ab4ae0c762b44192 }}/komodo-relay/komodo-relay:${{ github.sha }}'