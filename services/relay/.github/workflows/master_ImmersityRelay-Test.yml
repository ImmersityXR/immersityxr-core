# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ImmersityRelay-Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2
    
    - name: Copy environment config file
      run: echo "${{ secrets.BUILD_CONFIG }}" >> ./config.js

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://immersityxr.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_66221a05b2a7425a9425cddaaf2da857 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_67e5576f92d54b758d24ef97646d1908 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_66221a05b2a7425a9425cddaaf2da857 }}/komodo-relay/komodo-relay:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ImmersityRelay-Test'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_22ce9d32e9714aa28e9ecd5c76c71950 }}
        images: 'immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_66221a05b2a7425a9425cddaaf2da857 }}/komodo-relay/komodo-relay:${{ github.sha }}'
