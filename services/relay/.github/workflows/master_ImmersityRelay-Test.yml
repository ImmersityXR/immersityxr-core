# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ImmersityRelay-Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://github.com/immersityxr/immersity-relay.git/
        username: ${{ secrets.AzureAppService_ContainerUsername_dd34c6b661e344c49e37707b03407471 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_53fb5a82485f47edbea9baef6dabeec4 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: github.com/immersityxr/immersity-relay.git/${{ secrets.AzureAppService_ContainerUsername_dd34c6b661e344c49e37707b03407471 }}/komodo-relay/komodo-relay:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ImmersityRelay-Test'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_9e2985f9e756426897dd8b01e4dd7c12 }}
        images: 'github.com/immersityxr/immersity-relay.git/${{ secrets.AzureAppService_ContainerUsername_dd34c6b661e344c49e37707b03407471 }}/komodo-relay/komodo-relay:${{ github.sha }}'