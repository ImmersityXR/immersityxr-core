# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ImmersityBuild-Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://immersityxr.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_23f958e47c154d17b1966f9e909adc94 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_e3671c7a26ed4be6b2a30ce3e7c005b0 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_23f958e47c154d17b1966f9e909adc94 }}/komodo_buildserver:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ImmersityBuild-Test'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_5d0d3bf2348c4181bee02f7b9c18f961 }}
        images: 'immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_23f958e47c154d17b1966f9e909adc94 }}/komodo_buildserver:${{ github.sha }}'