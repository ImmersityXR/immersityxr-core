# ===========================================================================
# Traefik 3.3 Static Configuration
# ===========================================================================

# API and Dashboard
api:
  dashboard: true
  insecure: true # Enable dashboard on port 8080 (disable in production)

# Entry Points
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

# Docker Provider
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    # Ensures Traefik uses the 'proxy' network to communicate with other containers
    network: proxy

# Let's Encrypt Certificate Resolver
certificatesResolvers:
  letsencrypt:
    acme:
      # Email is configured via docker-compose.yml using ACME_EMAIL from .env
      # Note: Storage path must match the volume mount in docker-compose.yml
      storage: /acme.json
      httpChallenge:
        entryPoint: web

# Logging
log:
  level: INFO  # DEBUG, INFO, WARN, ERROR

accessLog:
  filePath: "/dev/stdout"
  format: common
