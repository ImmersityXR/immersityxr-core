services:
  # ===========================================================================
  # Traefik 3.3 - Reverse Proxy with Let's Encrypt
  # ===========================================================================
  immersity-proxy:
    image: traefik:v3.3
    container_name: immersity-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"  # Dashboard (disable in production)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./immersity-proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./immersity-proxy/acme.json:/acme.json
    networks:
      - proxy
    environment:
      - TZ=America/Chicago
    command:
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
    labels:
      - "traefik.enable=true"
      # Dashboard - Updated Rule syntax for v3
      - "traefik.http.routers.dashboard.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"

  # ===========================================================================
  # Immersity Relay - WebSocket/Socket.IO Server
  # ===========================================================================
  immersity-relay:
    image: immersityxr/immersity-relay:0.1.0
    # The published 0.1.0 image predates shared-secret auth support. To
    # enforce RELAY_CLIENT_SECRET / RELAY_ADMIN_SECRET, build from this
    # repository's sources: docker compose build immersity-relay
    build:
      context: ../services/relay
    pull_policy: missing
    container_name: immersity-relay
    restart: always
    volumes:
      - ./immersity-relay/captures:/immersity/captures
      # session state snapshots (entities, scene, draw strokes) - lets
      # shared state survive relay restarts and container recreation
      - ./immersity-relay/sessions:/immersity/sessions
      - ./immersity-relay/config.js:/immersity/config.js:ro
    networks:
      - proxy
    environment:
      - NODE_ENV=production
      - TZ=America/Chicago
      - RELAY_ORIGINS=${RELAY_ORIGINS}
      - RELAY_CLIENT_SECRET=${RELAY_CLIENT_SECRET}
      - RELAY_ADMIN_SECRET=${RELAY_ADMIN_SECRET}
      - RTC_STUN_URLS=${RTC_STUN_URLS}
      - RTC_TURN_URL=${RTC_TURN_URL}
      - RTC_TURN_USERNAME=${RTC_TURN_USERNAME}
      - RTC_TURN_CREDENTIAL=${RTC_TURN_CREDENTIAL}
      - SESSION_STATE_TTL_HOURS=${SESSION_STATE_TTL_HOURS}
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.immersity-relay.loadbalancer.server.port=80"

      # HTTP -> HTTPS redirect
      - "traefik.http.routers.relay-http.rule=Host(`${DOMAIN}`) && (PathPrefix(`/socket.io`) || PathPrefix(`/sync`) || PathPrefix(`/admin`) || PathPrefix(`/chat`))"
      - "traefik.http.routers.relay-http.entrypoints=web"
      - "traefik.http.routers.relay-http.middlewares=redirect-to-https"

      # HTTPS
      - "traefik.http.routers.relay-https.rule=Host(`${DOMAIN}`) && (PathPrefix(`/socket.io`) || PathPrefix(`/sync`) || PathPrefix(`/admin`) || PathPrefix(`/chat`))"
      - "traefik.http.routers.relay-https.entrypoints=websecure"
      - "traefik.http.routers.relay-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.relay-https.priority=100"

  # ===========================================================================
  # Immersity Build Server - Static File Server (NGINX)
  # ===========================================================================
  immersity-buildserver:
    image: immersityxr/immersity-buildserver:0.1.0
    build:
      context: ../services/buildserver
    pull_policy: missing
    container_name: immersity-buildserver
    restart: always
    volumes:
      - ./immersity-buildserver/builds:/usr/share/nginx/html:ro
    networks:
      - proxy
    environment:
      - TZ=America/Chicago
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.immersity-buildserver.loadbalancer.server.port=80"

      # HTTP -> HTTPS redirect
      - "traefik.http.routers.buildserver-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.buildserver-http.entrypoints=web"
      - "traefik.http.routers.buildserver-http.middlewares=redirect-to-https"

      # HTTPS
      - "traefik.http.routers.buildserver-https.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.buildserver-https.entrypoints=websecure"
      - "traefik.http.routers.buildserver-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.buildserver-https.priority=1"

  # ===========================================================================
  # Immersity Portal - Web Portal (optional)
  # Enable by setting COMPOSE_PROFILES=portal in .env
  # Built from ../portal in this repository. See docs/PORTAL.md for setup.
  # ===========================================================================
  immersity-portal-frontend:
    build:
      context: ../portal/frontend
    image: immersityxr/immersity-portal-frontend:local
    container_name: immersity-portal-frontend
    restart: always
    profiles: ["portal"]
    networks:
      - proxy
    environment:
      - TZ=${TZ:-America/Chicago}
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.immersity-portal-frontend.loadbalancer.server.port=80"

      # HTTP -> HTTPS redirect
      - "traefik.http.routers.portal-http.rule=Host(`${PORTAL_DOMAIN}`)"
      - "traefik.http.routers.portal-http.entrypoints=web"
      - "traefik.http.routers.portal-http.middlewares=redirect-to-https"

      # HTTPS
      - "traefik.http.routers.portal-https.rule=Host(`${PORTAL_DOMAIN}`)"
      - "traefik.http.routers.portal-https.entrypoints=websecure"
      - "traefik.http.routers.portal-https.tls.certresolver=letsencrypt"

  immersity-portal-backend:
    build:
      context: ../portal/backend
    image: immersityxr/immersity-portal-backend:local
    container_name: immersity-portal-backend
    restart: always
    profiles: ["portal"]
    networks:
      - proxy
    environment:
      - TZ=${TZ:-America/Chicago}
      - MYSQL_DATABASE=${PORTAL_MYSQL_DATABASE}
      - MYSQL_USER=${PORTAL_MYSQL_USER}
      - MYSQL_PASSWORD=${PORTAL_MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${PORTAL_MYSQL_ROOT_PASSWORD}
      # Initial admin account, created on first database initialization only
      - ADMIN_EMAIL=${PORTAL_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${PORTAL_ADMIN_PASSWORD}
    volumes:
      # Persist the in-container MariaDB data directory between restarts
      - ./immersity-portal/mysql-data:/home/mysql
      - ./immersity-portal/config.js:/immersity/portal/backend/config.js:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.immersity-portal-backend.loadbalancer.server.port=4040"

      # HTTP -> HTTPS redirect
      - "traefik.http.routers.portal-api-http.rule=Host(`${PORTAL_API_DOMAIN}`)"
      - "traefik.http.routers.portal-api-http.entrypoints=web"
      - "traefik.http.routers.portal-api-http.middlewares=redirect-to-https"

      # HTTPS
      - "traefik.http.routers.portal-api-https.rule=Host(`${PORTAL_API_DOMAIN}`)"
      - "traefik.http.routers.portal-api-https.entrypoints=websecure"
      - "traefik.http.routers.portal-api-https.tls.certresolver=letsencrypt"

  # ===========================================================================
  # Middleware Definitions
  # ===========================================================================
  traefik-middlewares:
    image: traefik:v3.3
    container_name: traefik-middlewares
    restart: "no"
    command: ["version"]
    networks:
      - proxy
    labels:
      # Redirect HTTP to HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

networks:
  proxy:
    external: true