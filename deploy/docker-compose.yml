version: "3.8"

services:
  # ===========================================================================
  # Traefik 2.x - Reverse Proxy with Let's Encrypt
  # ===========================================================================
  immersity-proxy:
    image: traefik:v2.10
    container_name: immersity-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard (disable in production)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./immersity-proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./immersity-proxy/acme.json:/acme.json
    networks:
      - proxy
    environment:
      - TZ=America/Chicago
    labels:
      - "traefik.enable=true"
      # Dashboard
      - "traefik.http.routers.dashboard.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"

  # ===========================================================================
  # Immersity Relay - WebSocket/Socket.IO Server
  # ===========================================================================
  immersity-relay:
    image: immersityxr/immersity-relay:0.1.0
    container_name: immersity-relay
    restart: always
    volumes:
      - ./immersity-relay/captures:/immersity/captures
      - ./immersity-relay/config.js:/immersity/config.js:ro
    networks:
      - proxy
    environment:
      - NODE_ENV=production
      - TZ=America/Chicago
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.immersity-relay.loadbalancer.server.port=80"
      
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.relay-http.rule=Host(`${DOMAIN}`) && (PathPrefix(`/socket.io`) || PathPrefix(`/sync`) || PathPrefix(`/admin`) || PathPrefix(`/chat`))"
      - "traefik.http.routers.relay-http.entrypoints=web"
      - "traefik.http.routers.relay-http.middlewares=redirect-to-https"
      
      # HTTPS
      - "traefik.http.routers.relay-https.rule=Host(`${DOMAIN}`) && (PathPrefix(`/socket.io`) || PathPrefix(`/sync`) || PathPrefix(`/admin`) || PathPrefix(`/chat`))"
      - "traefik.http.routers.relay-https.entrypoints=websecure"
      - "traefik.http.routers.relay-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.relay-https.priority=100"

  # ===========================================================================
  # Immersity Build Server - Static File Server (NGINX)
  # ===========================================================================
  immersity-buildserver:
    image: immersityxr/immersity-buildserver:0.1.0
    container_name: immersity-buildserver
    restart: always
    volumes:
      - ./immersity-buildserver/builds:/usr/share/nginx/html:ro
    networks:
      - proxy
    environment:
      - TZ=America/Chicago
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.immersity-buildserver.loadbalancer.server.port=80"
      
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.buildserver-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.buildserver-http.entrypoints=web"
      - "traefik.http.routers.buildserver-http.middlewares=redirect-to-https"
      
      # HTTPS
      - "traefik.http.routers.buildserver-https.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.buildserver-https.entrypoints=websecure"
      - "traefik.http.routers.buildserver-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.buildserver-https.priority=1"

# ===========================================================================
# Middleware Definitions
# ===========================================================================
  traefik-middlewares:
    image: traefik:v2.10
    container_name: traefik-middlewares
    restart: "no"
    command: ["version"]
    networks:
      - proxy
    labels:
      # Redirect HTTP to HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

networks:
  proxy:
    external: true

