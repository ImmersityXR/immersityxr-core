# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ImmersityPortalFront-Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://immersityxr.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_d31e941577014599a0b5501ef627e47b }}
        password: ${{ secrets.AzureAppService_ContainerPassword_1d61c88611274615884d5358110d869e }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_d31e941577014599a0b5501ef627e47b }}/immersityxr/immersity-portal/immersity-portal:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ImmersityPortalFront-Test'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_b8360e2c254c41cf9fa6bfb749b03805 }}
        images: 'immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_d31e941577014599a0b5501ef627e47b }}/immersityxr/immersity-portal/immersity-portal:${{ github.sha }}'