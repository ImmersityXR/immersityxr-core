# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ImmersityPortal-Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://immersityxr.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_794c6cd0c86f4f8b9b65c7c6646e003d }}
        password: ${{ secrets.AzureAppService_ContainerPassword_7269ffb0712343f0994872d9b3ca3379 }}

    - name: Build and push container image to registry1
      run: |
        cd ./frontend
    - name: Build and push container image to registry2
      run: |
        pwd
    - name: Build and push container image to registry3
      run: |
        echo "${{ secrets.BUILD_CONFIG }}" >> ./config.js
    - name: Build and push container image to registry4
      run: |
        docker build . -t immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_794c6cd0c86f4f8b9b65c7c6646e003d }}/komodo-portal/komodo-portal-frontend:${{ github.sha }}
    - name: Build and push container image to registry5
      run: |
        docker create --name portal-frontend-inspect immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_794c6cd0c86f4f8b9b65c7c6646e003d }}/komodo-portal/komodo-portal-frontend:${{ github.sha }}
    - name: Build and push container image to registry6
      run: |
        docker export portal-frontend-inspect | tar t | grep komodo/config
    - name: Build and push container image to registry7
      run: |
        docker rm portal-frontend-inspect
    - name: Build and push container image to registry8
      run: |
        docker push immersityxr.azurecr.io/${{ secrets.secrets.AzureAppService_ContainerUsername_794c6cd0c86f4f8b9b65c7c6646e003d }}/komodo-portal/komodo-portal-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ImmersityPortal-Test'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_6bc360f9b91049d395f2e2b45704986c }}
        images: 'immersityxr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_794c6cd0c86f4f8b9b65c7c6646e003d }}/immersity-portal/immersity-portal:${{ github.sha }}'
